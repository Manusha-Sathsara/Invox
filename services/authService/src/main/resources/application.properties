spring.application.name=invox

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://api.asgardeo.io/t/invox1/oauth2/token
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://api.asgardeo.io/t/invox1/oauth2/jwks

logging.level.org.springframework.security=TRACE
logging.level.org.springframework.boot.autoconfigure.security=DEBUG

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/invox_db
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect